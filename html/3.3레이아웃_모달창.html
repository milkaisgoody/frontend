<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모달창</title>
    <!-- <link rel="stylesheet" href="/css/basic.css"> -->
    <style>
        /* 구글폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap');
        /* 
            변수 선언
            --변수명 = 값; 
        */
        :root{
            --white : #fff;
        }
        /* 부모창 */
        .modal-backdrop{
            display: flex;
            /* row */
            /* 주축에 대한 정렬 */
            justify-content: center;
            /* align-items: stretch; */
            /* 요소가 가진 영역만큼만 차지 */
            align-items: center;
            /* 전체 고정 검정화면 */
            position: fixed;
            background-color: hsla(0, 0%, 0%, 0.322);
            /* 화면을 전체 채움 */
            inset: 0; 
        }
        .modal-box{
            /* background-color: #fff; */
            background-color: var(--white);
            width: 400px;
            /* 값을 하나만 주면 상하좌우 모두 padding값 20px로 들어감 */
            padding: 20px;
            position: relative;
            border-radius: 20px;
        }
        .modal-box input{
            width: 100%;
        }
        .modal-close{
            position: absolute;
            right: 20px;
            top: 20px;

            border: none;
            background-color: #fff;
            font-size: 2rem;
            color: #666;
        }
        .btn{

        }

        /* .w-100{
            width: 100px;
        }
        .bc-blue{
            background-color: blue;
        }
        .h-30px{
            height: 30px;
        }
        .fs-large{
            font-size: 1.2rem;
        }
        .border-radius-8{
            border-radius: 8px;
        }
        .border-none{
            border: none;
        } */

        #modalTitle{
            font-family: "Do Hyeon", sans-serif;
            font-weight: 550;
            font-style: normal;
            font-size: 2rem;
        }
        #modalContent{
            color:#666;
            /* margin-bottom: 20px; */
        }
        /* 세로 마진이 중첩되는 경우, 큰쪽으로 표현된다. 따라서 마진을 없애려면 두쪽 다 없애줘야 적용된다.*/
        .modal-box h3, .modal-box h6{
            margin: 0px;
        }

        .modal-box .mb-20{
            margin-bottom: 20px;
        }

        .modal-box input{
            margin: 10px 0px;
            height: 30px;
            font-size: 1.2rem;
            padding-left: 10px;
            border: 1px solid #ccc;
        }
        .show{

        }


    </style>

</head>


<body>

    <!-- 모달을 여는 버튼 -->
    <button id="loginTrigger">로그인</button>

    <!-- 평소엔 숨겨져 있는 백드롭 + 모달 -->
    <!--class 속성을 여러개 적용할 경우 띄어쓰기를 이용해서 연결 : modal-backdrop, show 두가지 클래스를 줌-->
    <div class="modal-backdrop show" id="modalBackdrop">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <button class="modal-close" id="modalClose" aria-label="닫기">&times;</button>
            <h3 id="modalTitle">로그인</h3>
            <h6 id="modalContent" class="mb-20">이메일과 비밀번호를 입력하세요</h6>
            <form id="loginForm">
                <!-- 인라인 속성을 가지고 있는 요소는 마진/패딩값을 가질 수 없다. -->
                <label for="email">이메일</label>
                <input type="email" id="email" required>

                <label for="password">비밀번호</label>
                <input type="password" id="password" required>

                <button type="submit" class="btn w-100 border-none h-30px fs-large">로그인</button>
            </form>
        </div>
    </div>


</body>

</html>
