<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>연습문제</title>
	<style>
		#container{
			margin: 0 auto; /*가로 중앙 정렬*/
			width: 700px;  /*이것까지 설정해줘야 중앙정렬됨 - 원래 가로 전체를 차지하고 있기 때문*/
		}
		h1{
			color: #fff;
			background-color: black;
			font-size: 1.5rem;
			padding: 10px;
			margin-top: 0px;
		}
		#check{
			border: 1px solid #ccc;
		}

	</style>
</head>

<body>
	<div id="container">
		<!--
			경로 앞에 아무것도 없는 경우 현재 파일의 위치를 기준으로 경로를 찾아간다.
		-->
		<img src="/html/img/top copy.jpg" alt="가정용 꿀사과 - 흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다. 질좋은 사과를 저렴하게 즐겨보세요">		
		<div id="check">
			<h1>확인하세요</h1>
			<h2>주문 및 배송</h2>
			<p><span>오후 2시 이전</span> 주문건은 당일 발송합니다<br>
			2시 이후 주문건은 다음날 발송합니다(주말 제외)</p>
			<hr>
			<h2>교환 및 환불</h2>
			<p>불만족시 <span>100% 환불</span>해 드립니다<br>
			고객센터로 전화주세요</p>
			<hr>
			<h2>고객센터 </h2>
			<p>0000-0000<br>
			<span>상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</span></p>
		</div>
	</div>
</body>
</html>
