<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입력양식 연습 2</title>
    <!--2. 내부 스타일-->
    <style>
        ul{
            padding: 0;
        }
    </style>
    <!--3. 외부스타일 -재사용--->
    <!--
        절대경로/상대경로
        / : 절대경로 (프로젝트의 최상위부터 찾아감)
        ./ : 현재위치
        ../ : 상위폴더
    -->
    <link rel="stylesheet" href="/css/style.css">

</head>
<body>
    <h1>프런트엔드 개발자 지원서</h1>
    <p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>
    <hr>
    <form action="" method="get">

        <p><b>개인정보</b></p>
        <ul>
            <!--
                ?name=오미선&tel=010111111111
                name속성의값=value속성의값            
            -->
            <li>이름 <input type="text" name="name" placeholder="공백없이 입력하세요" id="name"></li>
            <li>연락처 <input type="tel" name="tel" id=""></li>   
        </ul>
        
        <!--name : 서버에 데이터를 넘길때-->
        
        <p><b>지원 분야</b></p>
        <ul>
            <li class="red"><input type="radio" name="field" id="" value="1">웹 퍼블리싱 </li>
            <li class="red"><input type="radio" name="field" id="" value="2">웹 애플리케이션 개발</li>   
            <li class="red"><input type="radio" name="field" id="" value="3">개발 환경 개선</li>   
        </ul>
        
        <p><b>지원동기</b><p>
        <textarea cols="60" rows="5" name="reason" id="" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
        <br>
        <button type="submit">접수하기</button>
        <button type="reset">다시쓰기</button>  <!--<input type="reset" value="다시 쓰기">과 동일-->  
    </form>
</body>
</html>
