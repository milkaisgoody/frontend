<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            background-color: red;
            border: 1px solid black;
            width: 100px;
            height: 100px;
            padding: 0px 30px; /*상하 좌우*/
            margin: 10px 20px 30px 40px; /*상 우 하 좌*/
        }
        .box2{
            box-sizing: border-box; /*border-box : border까지를 나의 영역으로 보겠다는 의미*/
            border: 2px solid red;
            border-radius: 50%; 
            width: 100px;
            height: 100px;
            background-color: rgb(180, 180, 10);
            box-shadow: 10px 10px 10px 10px #999 ; /*색깔 앞 두개 생략 가능 세번째값은 흐림 정도*/
            text-align: center;

            /*세로정렬*/
            height: 100px;
            line-height: 100px;
        }
        .circle{
            border-radius: 50%;
        }

        .banner{
            background-color: black;
            display: flex;
            justify-content: space-between; /*center도 가능*/
        }

        .boxitem{
            width: 300px;
            height: 200px;
            background-color: #fff;
            border: 1px solid red;

            /* display: inline-block; */
            border-radius: 20px;
        }

    </style>
</head>
<body>

    <div class="box">a</div>
    <div class="box2">버튼</div>
    <img class="circle box2" src="img/pf.jpg" alt="">
    <div class="banner">
        <div class="boxitem">1</div>
        <div class="boxitem">2</div>
        <div class="boxitem">3</div>
        <div class="boxitem">4</div>
    </div>
</body>
</html>
